<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite Points Academy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1916; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { text-align: center; padding: 40px 20px; }
    h1 { font-size: 2rem; margin-bottom: 8px; letter-spacing: 0.05em; }
    p { color: #9e9a8e; margin-bottom: 40px; }
    .links { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
    .links a { display: block; padding: 20px 40px; border: 1px solid #3e3b35; border-radius: 8px; transition: all 0.3s; min-width: 200px; }
    .links a:hover { border-color: #b8964e; background: rgba(184,150,78,0.1); }
    .links a h2 { font-size: 1.1rem; margin-bottom: 4px; color: #b8964e; }
    .links a span { font-size: 0.8rem; color: #7a766c; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Elite Points Academy</h1>
    <p>米国クレカ活用支援サービス</p>
    <p style="color:#b8964e; font-size:0.85rem; margin-bottom:32px; border:1px solid #b8964e; display:inline-block; padding:6px 16px; border-radius:4px;">モック確認用 - 画像・テキストは仮データです</p>
    <div class="links">
      <a href="./lp1/">
        <h2>LP1: 営業カタログ</h2>
        <span>パスワード認証あり</span>
      </a>
      <a href="./lp2/">
        <h2>LP2: SNS広告用</h2>
        <span>CV特化ページ</span>
      </a>
    </div>
  </div>
</body>
</html>
